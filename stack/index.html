<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azizbek Mamanov // Stack</title>
  <meta name="description" content="Tech stack of Azizbek Mamanov — languages, web, systems, and security (learning)." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../about/styles.css" />
  <style>
    .stack-page{max-width:980px}
    .stack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .stack-col{background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;
      padding:22px 20px;position:relative;overflow:hidden;
      transition:border-color .3s,transform .3s,box-shadow .3s}
    .stack-col::after{content:"";position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
      opacity:0;transition:opacity .35s}
    .stack-col:hover{border-color:#2e3745;transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.45)}
    .stack-col:hover::after{opacity:.75}
    .stack-col h3{font-family:"JetBrains Mono",monospace;color:var(--accent);font-size:14px;
      margin-bottom:16px;letter-spacing:.5px}
    .stack-col ul{list-style:none;display:flex;flex-direction:column;gap:11px;padding:0}
    .stack-col li{color:var(--muted);font-size:14.5px;display:flex;align-items:center;gap:9px;
      transition:color .2s,transform .2s}
    .stack-col li::before{content:"▹";color:var(--cyan);font-size:13px;transition:transform .2s}
    .stack-col li:hover{color:var(--text);transform:translateX(4px)}
    .stack-col li:hover::before{transform:scale(1.3)}
    @media(max-width:760px){.stack-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="glow-bg" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="glitch-fx" aria-hidden="true"></div>

  <header class="cyber-header">
    <div class="header-logo">
      <span class="bracket">[</span>az<span class="blink">_</span>sys.stack<span class="bracket">]</span>
    </div>
    <nav class="header-nav">
      <a href="../index.html" class="btn-back">← RETURN TO MAIN</a>
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" data-lang="uz">UZ</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
      </div>
    </nav>
  </header>

  <main class="container stack-page">
    <section class="profile-hero">
      <div class="profile-intro">
        <div class="profile-meta">
          <span class="badge badge--red" data-i18n="badge">STACK & ARSENAL</span>
          <span class="sys-time" id="sysTime">SYS_TIME: --</span>
        </div>
        <h1 class="profile-title" data-i18n="title">STEK</h1>
        <p class="profile-subtitle" data-i18n="subtitle">// texnologiyalar va vositalar</p>
      </div>
    </section>

    <section class="panel reveal">
      <div class="panel-body">
        <div class="stack-grid" id="stackGrid"></div>
      </div>
    </section>
  </main>

  <footer class="cyber-footer">
    <span data-i18n="footer">© 2026 Azizbek Mamanov // stack</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
